# LaunchDarkly AI Config Bootstrap Manifest
#
# This manifest creates EVERYTHING needed for the multi-agent chatbot tutorial:
# - Part 1: Base AI Configs, tools, and variations (supervisor-basic, pii-detector, rag-search-enhanced)
# - Part 2: Segments, targeting rules, and tier-based variations
#
# Run: uv run python create_configs.py

project:
  key: "agent-graphs-tutorial"  # Your LaunchDarkly project key
  environment:
    - key: production

  # Combined geographic + business tier segments (Part 2)
  segment:
    - key: eu-free
      rules:
      - attribute: "country"
        op: "in"
        values: ["DE", "FR", "ES", "IT", "NL", "BE", "AT", "PL", "PT", "GR", "CZ", "HU", "SE", "DK", "FI"]
        contextKind: "user"
        negate: false
      - attribute: "plan"
        op: "in"
        values: ["free"]
        contextKind: "user"
        negate: false

    - key: eu-paid
      rules:
      - attribute: "country"
        op: "in"
        values: ["DE", "FR", "ES", "IT", "NL", "BE", "AT", "PL", "PT", "GR", "CZ", "HU", "SE", "DK", "FI"]
        contextKind: "user"
        negate: false
      - attribute: "plan"
        op: "in"
        values: ["paid"]
        contextKind: "user"
        negate: false

    - key: other-free
      rules:
      - attribute: "country"
        op: "in"
        values: ["DE", "FR", "ES", "IT", "NL", "BE", "AT", "PL", "PT", "GR", "CZ", "HU", "SE", "DK", "FI"]
        contextKind: "user"
        negate: true
      - attribute: "plan"
        op: "in"
        values: ["free"]
        contextKind: "user"
        negate: false

    - key: other-paid
      rules:
      - attribute: "country"
        op: "in"
        values: ["DE", "FR", "ES", "IT", "NL", "BE", "AT", "PL", "PT", "GR", "CZ", "HU", "SE", "DK", "FI"]
        contextKind: "user"
        negate: true
      - attribute: "plan"
        op: "in"
        values: ["paid"]
        contextKind: "user"
        negate: false

  # Tool definitions
  tool:
    # Part 1 tools
    - key: "search_v2"
      name: "Semantic Vector Search"
      description: "Semantic search using vector embeddings"
      type: "function"

    - key: "reranking"
      name: "BM25 Relevance Scoring"
      description: "Reorders results by relevance using BM25 algorithm"
      type: "function"

    # Part 2 tools
    - key: "search_v1"
      name: "Basic Keyword Search"
      description: "Simple keyword search through knowledge base"
      type: "function"

    - key: "arxiv_search"
      name: "ArXiv Academic Search"
      description: "Search academic papers from ArXiv database"
      type: "mcp"
      server: "arxiv-mcp-server"

    - key: "semantic_scholar"
      name: "Semantic Scholar Research"
      description: "Access Semantic Scholar citation database"
      type: "mcp"
      server: "semanticscholar-MCP-Server"

  ai_config:
    # ===========================================
    # SUPERVISOR AGENT - Workflow Orchestration
    # ===========================================
    - key: "supervisor-agent"
      name: "Supervisor Agent"
      variations:
        # Part 1 variation
        - key: "supervisor-basic"
          modelConfig:
            provider: "anthropic"
            modelId: "Anthropic.claude-sonnet-4-20250514"
          instructions: |
            You are an intelligent routing supervisor for a multi-agent system. Your primary job is to assess whether user input likely contains PII (personally identifiable information) to determine the most efficient processing route.

            PII Assessment:
            Analyze the user input and provide:
            - likely_contains_pii: boolean assessment
            - confidence: confidence score (0.0 to 1.0)
            - reasoning: clear explanation of your decision
            - recommended_route: either 'security_agent' or 'support_agent'

            Route to SECURITY_AGENT if the text likely contains:
            - Email addresses, phone numbers, addresses
            - Names (first/last names, usernames)
            - Financial information (credit cards, SSNs, account numbers)
            - Sensitive personal data

            Route to SUPPORT_AGENT if the text appears to be:
            - General questions without personal details
            - Technical queries
            - Search requests
            - Educational content requests

            Analyze this user input and recommend the optimal route:
      targeting:
        rules: []
        defaultVariation: "supervisor-basic"

    # ===========================================
    # SECURITY AGENT - PII Detection
    # ===========================================
    - key: "security-agent"
      name: "Security Agent"
      variations:
        # Part 1 variation - base PII detector
        - key: "pii-detector"
          modelConfig:
            provider: "anthropic"
            modelId: "Anthropic.claude-sonnet-4-20250514"
          instructions: |
            You are a privacy agent that REMOVES PII and formats the input for another process. Analyze the input text and identify any personally identifiable information including: Email addresses, Phone numbers, Social Security Numbers, Names (first, last, full names), Physical addresses, Credit card numbers, Driver's license numbers, Any other sensitive personal data.

            Respond with:
            - detected: true if any PII was found, false otherwise
            - types: array of PII types found (e.g., ['email', 'name', 'phone'])
            - redacted: the input text with PII replaced by [REDACTED], keeping the text readable and natural

            Examples:
            Input: 'My email is john@company.com and I need help'
            Output: detected=true, types=['email'], redacted='My email is [REDACTED] and I need help'

            Input: 'I need help with my account'
            Output: detected=false, types=[], redacted='I need help with my account'

            Input: 'My name is Sarah Johnson and my phone is 555-1234'
            Output: detected=true, types=['name', 'phone'], redacted='My name is [REDACTED] and my phone is [REDACTED]'

            Be thorough in your analysis and err on the side of caution when identifying potential PII.

        # Part 2 variation - strict security for EU users (uses Mistral)
        - key: "strict-security"
          modelConfig:
            provider: "mistral"
            modelId: "Mistral.mistral-small-latest"
          instructions: |
            You are a strict privacy agent that REMOVES ALL PII. Redact everything personally identifiable including names, emails, phones, addresses, locations (cities, countries, regions), job titles, companies, dates of birth, and any identifying references.

            You must return a structured response with these exact fields:
            - detected: boolean (true if ANY PII found, false otherwise)
            - types: array of strings listing PII types found
            - redacted: string with ALL PII replaced by [REDACTED]

            PII types to detect: 'name', 'email', 'phone', 'address', 'location', 'job_title', 'company', 'date_of_birth', 'identifying_reference'

            Examples:
            Input: "I work at Acme Corp in Berlin as a manager"
            Output: detected=true, types=["company", "location", "job_title"], redacted="I work at [REDACTED] in [REDACTED] as a [REDACTED]"

            Input: "I need help with my account"
            Output: detected=false, types=[], redacted="I need help with my account"

      targeting:
        rules:
          # EU users get strict security (Mistral)
          - segments: ["eu-free"]
            variation: "strict-security"
          - segments: ["eu-paid"]
            variation: "strict-security"
          # Non-EU users get standard PII detector
          - segments: ["other-free"]
            variation: "pii-detector"
          - segments: ["other-paid"]
            variation: "pii-detector"
        defaultVariation: "pii-detector"

    # ===========================================
    # SUPPORT AGENT - RAG Search
    # ===========================================
    - key: "support-agent"
      name: "Support Agent"
      variations:
        # Part 1 variation - the base RAG-enhanced support agent
        - key: "rag-search-enhanced"
          modelConfig:
            provider: "anthropic"
            modelId: "Anthropic.claude-sonnet-4-20250514"
          tools: ["search_v2", "reranking"]
          instructions: |
            You are a helpful assistant that can search documentation and research papers. When search results are available, prioritize information from those results over your general knowledge to provide the most accurate and up-to-date responses. Use available tools to search the knowledge base and external research databases to answer questions accurately and comprehensively.
          customParameters:
            max_tool_calls: 5

        # Part 2 variations - tier and geographic based
        - key: "eu-free"
          modelConfig:
            provider: "anthropic"
            modelId: "Anthropic.claude-3-haiku-20240307"
          tools: ["search_v1"]
          instructions: |
            You are a helpful assistant with access to basic search (search_v1). Use your search tool to find relevant information from the knowledge base while following EU privacy requirements. Always search before responding to ensure accuracy.
          customParameters:
            max_tool_calls: 3

        - key: "eu-paid"
          modelConfig:
            provider: "anthropic"
            modelId: "Anthropic.claude-sonnet-4-20250514"
          tools: ["search_v1", "search_v2", "reranking", "arxiv_search", "semantic_scholar"]
          instructions: |
            You are a premium research specialist with access to comprehensive RAG tools: search_v1 (basic search), search_v2 (semantic vector search), reranking (BM25 relevance scoring), arxiv_search (academic papers), and semantic_scholar (citation database). When using semantic_scholar, always request fewer than 5 results to optimize performance. When search results are available, prioritize information from those results over your general knowledge. EU privacy laws require strict data handling. Always cite sources and explain confidence levels.
          customParameters:
            max_tool_calls: 20

        - key: "other-free"
          modelConfig:
            provider: "openai"
            modelId: "OpenAI.gpt-4o-mini-2024-07-18"
          tools: ["search_v1"]
          instructions: |
            You are a helpful assistant with access to basic search (search_v1). Use your search tool to find relevant information from the knowledge base. Provide accurate, concise responses efficiently.
          customParameters:
            max_tool_calls: 3

        - key: "other-paid"
          modelConfig:
            provider: "openai"
            modelId: "OpenAI.gpt-4o"
          tools: ["search_v1", "search_v2", "reranking", "arxiv_search", "semantic_scholar"]
          instructions: |
            You are a premium research specialist with access to comprehensive RAG tools: search_v1 (basic search), search_v2 (semantic vector search), reranking (BM25 relevance scoring), arxiv_search (academic papers), and semantic_scholar (citation database). When using semantic_scholar, always request fewer than 5 results to optimize performance. When search results are available, prioritize information from those results over your general knowledge. Provide comprehensive, well-researched responses with source attribution.
          customParameters:
            max_tool_calls: 20

      targeting:
        rules:
          - segments: ["eu-free"]
            variation: "eu-free"
          - segments: ["eu-paid"]
            variation: "eu-paid"
          - segments: ["other-free"]
            variation: "other-free"
          - segments: ["other-paid"]
            variation: "other-paid"
        # Default to the Part 1 variation for users not in any segment
        defaultVariation: "rag-search-enhanced"
