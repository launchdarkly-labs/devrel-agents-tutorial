# LaunchDarkly AI Config Bootstrap Manifest
#
# This manifest creates EVERYTHING needed for the multi-agent chatbot tutorial:
# - Part 1: Base AI Configs, tools, and variations (supervisor-basic, pii-detector, rag-search-enhanced)
# - Part 2: Segments, targeting rules, and tier-based variations
#
# Run: uv run python create_configs.py

project:
  key: "offline-evals-tutorial"  # Your LaunchDarkly project key
  environment:
    - key: production

  # Agent Graph definition
  agent_graph:
    key: "chatbot-flow"
    name: "Chatbot Flow"
    description: "Multi-agent support chatbot with PII detection"
    rootConfigKey: "supervisor-agent"
    edges:
      - key: "edge-supervisor-security"
        sourceConfig: "supervisor-agent"
        targetConfig: "security-agent"
        handoff:
          action: "sanitize"
          reason: "PII detected"
          route: "security"
      - key: "edge-supervisor-support"
        sourceConfig: "supervisor-agent"
        targetConfig: "support-agent"
        handoff:
          action: "direct"
          reason: "Clean input"
          route: "support"
      - key: "edge-security-support"
        sourceConfig: "security-agent"
        targetConfig: "support-agent"
        handoff:
          action: "proceed"
          reason: "Input sanitized"
          route: "continue"

  # Combined geographic + business tier segments (Part 2)
  segment:
    - key: eu-free
      rules:
      - attribute: "country"
        op: "in"
        values: ["DE", "FR", "ES", "IT", "NL", "BE", "AT", "PL", "PT", "GR", "CZ", "HU", "SE", "DK", "FI"]
        contextKind: "user"
        negate: false
      - attribute: "plan"
        op: "in"
        values: ["free"]
        contextKind: "user"
        negate: false

    - key: eu-paid
      rules:
      - attribute: "country"
        op: "in"
        values: ["DE", "FR", "ES", "IT", "NL", "BE", "AT", "PL", "PT", "GR", "CZ", "HU", "SE", "DK", "FI"]
        contextKind: "user"
        negate: false
      - attribute: "plan"
        op: "in"
        values: ["paid"]
        contextKind: "user"
        negate: false

    - key: other-free
      rules:
      - attribute: "country"
        op: "in"
        values: ["DE", "FR", "ES", "IT", "NL", "BE", "AT", "PL", "PT", "GR", "CZ", "HU", "SE", "DK", "FI"]
        contextKind: "user"
        negate: true
      - attribute: "plan"
        op: "in"
        values: ["free"]
        contextKind: "user"
        negate: false

    - key: other-paid
      rules:
      - attribute: "country"
        op: "in"
        values: ["DE", "FR", "ES", "IT", "NL", "BE", "AT", "PL", "PT", "GR", "CZ", "HU", "SE", "DK", "FI"]
        contextKind: "user"
        negate: true
      - attribute: "plan"
        op: "in"
        values: ["paid"]
        contextKind: "user"
        negate: false

  # Tool definitions
  tool:
    - key: "search_v2"
      name: "Semantic Vector Search"
      description: "Search the knowledge base using semantic similarity. Use for technical questions and concepts."
      type: "function"

    - key: "reranking"
      name: "BM25 Relevance Scoring"
      description: "Rerank search results by relevance. Use after search to improve result ordering."
      type: "function"

    - key: "search_v1"
      name: "Basic Keyword Search"
      description: "Keyword search through the knowledge base. Use for finding specific terms."
      type: "function"

    - key: "arxiv_search"
      name: "ArXiv Academic Search"
      description: "Search academic papers on ArXiv."
      type: "mcp"
      server: "arxiv-mcp-server"

    - key: "semantic_scholar"
      name: "Semantic Scholar Research"
      description: "Search Semantic Scholar for academic papers and citations."
      type: "mcp"
      server: "semanticscholar-MCP-Server"

  ai_config:
    # ===========================================
    # SUPERVISOR AGENT - Workflow Orchestration
    # ===========================================
    - key: "supervisor-agent"
      name: "Supervisor Agent"
      variations:
        # Part 1 variation
        - key: "supervisor-basic"
          modelConfig:
            provider: "anthropic"
            modelId: "Anthropic.claude-sonnet-4-20250514"
          instructions: |
            You are a routing supervisor. Analyze user input for PII and route accordingly.

            Route to "security" if the text contains:
            - Email addresses, phone numbers, physical addresses
            - Names, SSNs, credit card numbers, account numbers
            - Any personally identifiable information

            Route to "support" if the text is:
            - General questions without personal details
            - Technical queries, product questions

            IMPORTANT: You must respond with ONLY a JSON object in this exact format:
            {"route": "security"} or {"route": "support"}

            Do not include any other text, explanation, or formatting. Just the JSON object.
      targeting:
        rules: []
        defaultVariation: "supervisor-basic"

    # ===========================================
    # SECURITY AGENT - PII Detection
    # ===========================================
    - key: "security-agent"
      name: "Security Agent"
      variations:
        # Part 1 variation - base PII detector
        - key: "pii-detector"
          modelConfig:
            provider: "anthropic"
            modelId: "Anthropic.claude-sonnet-4-20250514"
          instructions: |
            You are a privacy agent that REMOVES PII and formats the input for another process. Analyze the input text and identify any personally identifiable information including: Email addresses, Phone numbers, Social Security Numbers, Names (first, last, full names), Physical addresses, Credit card numbers, Driver's license numbers, Any other sensitive personal data.

            Respond with:
            - detected: true if any PII was found, false otherwise
            - types: array of PII types found (e.g., ['email', 'name', 'phone'])
            - redacted: the input text with PII replaced by [REDACTED], keeping the text readable and natural

            Examples:
            Input: 'My email is john@company.com and I need help'
            Output: detected=true, types=['email'], redacted='My email is [REDACTED] and I need help'

            Input: 'I need help with my account'
            Output: detected=false, types=[], redacted='I need help with my account'

            Input: 'My name is Sarah Johnson and my phone is 555-1234'
            Output: detected=true, types=['name', 'phone'], redacted='My name is [REDACTED] and my phone is [REDACTED]'

            Be thorough in your analysis and err on the side of caution when identifying potential PII.

        # Part 2 variation - strict security for EU users (uses Mistral)
        - key: "strict-security"
          modelConfig:
            provider: "mistral"
            modelId: "Mistral.mistral-small-latest"
          instructions: |
            You are a strict privacy agent that REMOVES ALL PII. Redact everything personally identifiable including names, emails, phones, addresses, locations (cities, countries, regions), job titles, companies, dates of birth, and any identifying references.

            You must return a structured response with these exact fields:
            - detected: boolean (true if ANY PII found, false otherwise)
            - types: array of strings listing PII types found
            - redacted: string with ALL PII replaced by [REDACTED]

            PII types to detect: 'name', 'email', 'phone', 'address', 'location', 'job_title', 'company', 'date_of_birth', 'identifying_reference'

            Examples:
            Input: "I work at Acme Corp in Berlin as a manager"
            Output: detected=true, types=["company", "location", "job_title"], redacted="I work at [REDACTED] in [REDACTED] as a [REDACTED]"

            Input: "I need help with my account"
            Output: detected=false, types=[], redacted="I need help with my account"

      targeting:
        rules:
          # EU users get strict security (Mistral)
          - segments: ["eu-free"]
            variation: "strict-security"
          - segments: ["eu-paid"]
            variation: "strict-security"
          # Non-EU users get standard PII detector
          - segments: ["other-free"]
            variation: "pii-detector"
          - segments: ["other-paid"]
            variation: "pii-detector"
        defaultVariation: "pii-detector"

    # ===========================================
    # SUPPORT AGENT - RAG Search
    # ===========================================
    - key: "support-agent"
      name: "Support Agent"
      variations:
        # Part 1 variation - the base RAG-enhanced support agent
        - key: "rag-search-enhanced"
          modelConfig:
            provider: "anthropic"
            modelId: "Anthropic.claude-sonnet-4-20250514"
          tools: ["search_v2", "reranking"]
          instructions: |
            You are Umbra's support assistant. Umbra is a cloud deployment platform for developers.

            Use your search tools to find accurate information from Umbra's documentation before answering questions about:
            - Refund policies and billing
            - Deployment regions and availability
            - Account management and subscriptions
            - Features, limits, and pricing tiers
            - Troubleshooting common issues

            IMPORTANT: Only answer based on information found in the documentation. If you cannot find relevant information, say so clearly. Never make up policies or features.

            When citing sources, mention the document name (e.g., "According to Umbra's Account Management documentation...") but do NOT generate markdown links or URLs.
          customParameters:
            max_tool_calls: 5

        # Part 2 variations - tier and geographic based
        - key: "eu-free"
          modelConfig:
            provider: "anthropic"
            modelId: "Anthropic.claude-3-haiku-20240307"
          tools: ["search_v1"]
          instructions: |
            You are Umbra's support assistant for EU users on the free tier. Use search_v1 to find information from Umbra's documentation about billing, deployments, regions, and account management. Follow EU privacy requirements. Only answer based on documentation - never make up policies.
          customParameters:
            max_tool_calls: 3

        - key: "eu-paid"
          modelConfig:
            provider: "anthropic"
            modelId: "Anthropic.claude-sonnet-4-20250514"
          tools: ["search_v1", "search_v2", "reranking"]
          instructions: |
            You are Umbra's premium support assistant for EU paid users. Use your search tools to find accurate information from Umbra's documentation. EU privacy laws require strict data handling. Only answer based on documentation - never make up policies. Mention document names when citing sources but do NOT generate markdown links.
          customParameters:
            max_tool_calls: 10

        - key: "other-free"
          modelConfig:
            provider: "openai"
            modelId: "OpenAI.gpt-4o-mini-2024-07-18"
          tools: ["search_v1"]
          instructions: |
            You are Umbra's support assistant. Use search_v1 to find information from Umbra's documentation about billing, deployments, regions, and account management. Only answer based on documentation - never make up policies.
          customParameters:
            max_tool_calls: 3

        - key: "other-paid"
          modelConfig:
            provider: "openai"
            modelId: "OpenAI.gpt-4o"
          tools: ["search_v1", "search_v2", "reranking"]
          instructions: |
            You are Umbra's premium support assistant. Use your search tools to find accurate information from Umbra's documentation about billing, deployments, regions, features, and troubleshooting. Only answer based on documentation - never make up policies. Mention document names when citing sources but do NOT generate markdown links.
          customParameters:
            max_tool_calls: 10

      targeting:
        rules:
          - segments: ["eu-free"]
            variation: "eu-free"
          - segments: ["eu-paid"]
            variation: "eu-paid"
          - segments: ["other-free"]
            variation: "other-free"
          - segments: ["other-paid"]
            variation: "other-paid"
        # Default to the Part 1 variation for users not in any segment
        defaultVariation: "rag-search-enhanced"
